<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — R2 File Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                    },
                    borderRadius: { xl: '0.75rem', '2xl': '1rem' },
                    boxShadow: { 'soft': '0 1px 3px 0 rgb(0 0 0 / 0.05), 0 1px 2px -1px rgb(0 0 0 / 0.05)' },
                }
            }
        };
    </script>
    <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
    <style>
        button:focus-visible, input:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl border border-gray-200 shadow-soft p-8">
            <div class="flex items-center gap-3 mb-8">
                <span class="w-12 h-12 rounded-xl bg-primary-50 flex items-center justify-center">
                    <i data-feather="lock" class="w-6 h-6 text-primary-600"></i>
                </span>
                <div>
                    <h1 class="text-xl font-semibold text-gray-900">R2 File Manager</h1>
                    <p class="text-sm text-gray-500">Sign in to continue</p>
                </div>
            </div>

            <div id="login-error" class="hidden mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
                Invalid username or password.
            </div>

            <form method="post" action="/login" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                        class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="Username">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="Password">
                </div>
                <button type="submit"
                    class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition">
                    <i data-feather="log-in" class="w-4 h-4"></i>
                    Sign in
                </button>
            </form>
        </div>
    </div>

    <script>
        feather.replace();
        if (window.location.search.indexOf('error=1') !== -1) {
            document.getElementById('login-error').classList.remove('hidden');
        }
    </script>
</body>

</html>
